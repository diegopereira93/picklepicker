# Staging configuration for pipeline E2E tests
# These are used by load_staging_config() in test_utils.py

brazil_store:
  url: "https://brazilpickleballstore.com.br/raquete/"
  retailer_id: 1

dropshot_brasil:
  url: "https://www.dropshotbrasil.com.br/raquetes"
  retailer_id: 3

mercado_livre:
  search_url: "https://api.mercadolibre.com/sites/MLB/search"
  query: "raquete pickleball"
  category: "MLB1276"
  retailer_id: 2

# Retry and backoff settings (used for mock assertions, not real waits in tests)
timeout_seconds: 30
retry_attempts: 3
backoff_base_seconds: 10
backoff_max_seconds: 120

# Performance thresholds
performance:
  max_crawl_seconds_per_scraper: 30
  max_concurrent_all_scrapers_seconds: 45
