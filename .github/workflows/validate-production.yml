name: Production Validation - Plan 06-04

on:
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * *" # Daily at 12 PM UTC

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run production validation suite
        run: npx playwright test scripts/validate-production.ts
        env:
          ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}

      - name: Upload validation results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-results
          path: playwright-report/

      - name: Post validation results
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ Production validation failed. Check workflow artifacts for details.'
            })
