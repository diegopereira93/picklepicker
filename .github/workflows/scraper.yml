name: Data Crawlers

on:
  schedule:
    # Stagger schedules: 2:00, 2:05, 2:10 UTC to prevent thundering herd
    - cron: '0 2 * * *'
    - cron: '5 2 * * *'
    - cron: '10 2 * * *'
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ./pipeline
          pip install -e ./backend

      - name: Add jitter delay
        run: |
          echo "Adding jitter delay to prevent resource contention..."
          sleep $((RANDOM % 120))

      - name: Run crawlers with retry
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 30
          max_attempts: 3
          retry_on: error
          command: |
            echo "Running Brazil Store crawler..."
            python -m pipeline.crawlers.brazil_store
            echo "Running JOOLA crawler..."
            python -m pipeline.crawlers.joola
            echo "Running Dropshot Brasil crawler..."
            python -m pipeline.crawlers.dropshot_brasil

      - name: Verify crawl results
        run: |
          python -c "
          import asyncio
          from pipeline.db.connection import get_pool

          async def count_paddles():
              try:
                  pool = await get_pool()
                  async with pool.acquire() as conn:
                      result = await conn.fetchval('SELECT COUNT(*) FROM paddles')
                      print(f'Total paddles indexed: {result}')
                      if result < 200:
                          print(f'WARNING: Expected >= 200 paddles, got {result}')
              except Exception as e:
                  print(f'Database check failed: {e}')

          asyncio.run(count_paddles())
          "

      - name: Refresh latest_prices materialized view
        if: always()
        run: |
          python3 -c "
          import asyncio
          import sys
          sys.path.insert(0, '.')
          from pipeline.db.connection import get_pool
          from pipeline.alerts.telegram import send_telegram_alert

          async def main():
              try:
                  pool = await get_pool()
                  async with pool.acquire() as conn:
                      await conn.execute('REFRESH MATERIALIZED VIEW CONCURRENTLY latest_prices')
                  print('✅ latest_prices materialized view refreshed successfully')
              except Exception as e:
                  msg = f'🚨 Failed to refresh latest_prices MV: {e}\nCheck: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}'
                  print(msg)
                  await send_telegram_alert(msg)
                  sys.exit(1)

          asyncio.run(main())
          "

      - name: Check data freshness
        if: always()
        run: |
          python -c "
          import asyncio
          import sys
          from pipeline.alerts.freshness import check_data_freshness

          async def main():
              results = await check_data_freshness()
              stale_sources = [s for s, fresh in results.items() if not fresh]
              if stale_sources:
                  print(f'WARNING: Stale data detected for: {stale_sources}')
                  sys.exit(0)
              else:
                  print('All data sources are fresh')

          asyncio.run(main())
          "
        continue-on-error: true

      - name: Notify on failure
        if: failure()
        run: |
          python3 -c "
          import asyncio
          import os
          import sys
          sys.path.insert(0, '.')
          from pipeline.alerts.telegram import send_telegram_alert
          msg = '🚨 Scraper workflow FAILED. Check: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}'
          asyncio.run(send_telegram_alert(msg))
          "

      - name: Check data quality
        if: always()
        run: |
          python3 -c "
          import asyncio
          import sys
          sys.path.insert(0, '.')
          from pipeline.db.connection import get_pool
          from pipeline.alerts.telegram import send_telegram_alert

          async def main():
              pool = await get_pool()
              async with pool.acquire() as conn:
                  fields = ['brand', 'image_url']
                  warnings = []
                  for field in fields:
                      result = await conn.fetchrow('''
                          SELECT
                              COUNT(*) as total,
                              COUNT(*) FILTER (WHERE {field} IS NULL OR {field} = '') as nulls
                          FROM paddles
                      '''.format(field=field))
                      total = result['total'] or 0
                      nulls = result['nulls'] or 0
                      null_pct = (nulls / total * 100) if total > 0 else 0.0
                      if null_pct > 30:
                          warnings.append(f'paddles.{field}: {null_pct:.1f}% null ({nulls}/{total})')

              if warnings:
                  msg = '⚠️ Data Quality Alert:\n' + '\n'.join(warnings)
                  print(msg)
                  await send_telegram_alert(msg)
              else:
                  print('Data quality OK - all fields below 30% null rate')

          asyncio.run(main())
          "
        continue-on-error: true
