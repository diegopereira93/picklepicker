name: Data Crawlers

on:
  schedule:
    - cron: '0 2 * * *'  # 2 AM UTC = 10 PM BRT (off-peak)
  workflow_dispatch:  # Manual trigger

jobs:
  crawl:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
      MERCADO_LIVRE_API_KEY: ${{ secrets.MERCADO_LIVRE_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ./backend

      - name: Run Brazil Pickleball Store crawler
        run: |
          cd backend
          python -m pipeline.crawlers.brazil_pickleball_store
        continue-on-error: true

      - name: Run Mercado Livre crawler
        run: |
          cd backend
          python -m pipeline.crawlers.mercado_livre
        continue-on-error: true

      - name: Run Drop Shot Brasil crawler
        run: |
          cd backend
          python -m pipeline.crawlers.drop_shot_brasil
        continue-on-error: true

      - name: Verify crawl results
        run: |
          cd backend
          python -c "
import asyncio
from app.db import get_db
from sqlalchemy import text

async def count_paddles():
    try:
        async with get_db() as conn:
            result = await conn.execute(text('SELECT COUNT(*) FROM paddles'))
            count = result.scalar()
            print(f'Total paddles indexed: {count}')
            if count < 200:
                print(f'WARNING: Expected >= 200 paddles, got {count}')
    except Exception as e:
        print(f'Database check failed: {e}')

asyncio.run(count_paddles())
          "

      - name: Notify on failure
        if: failure()
        run: |
          echo "Scraper workflow failed - check logs in Railway"
