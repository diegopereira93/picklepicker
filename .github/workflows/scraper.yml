name: Data Crawlers

on:
  schedule:
    # Stagger schedules: 2:00, 2:05, 2:10 UTC to prevent thundering herd
    - cron: '0 2 * * *'
    - cron: '5 2 * * *'
    - cron: '10 2 * * *'
  workflow_dispatch:  # Manual trigger

jobs:
  crawl:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
      MERCADO_LIVRE_API_KEY: ${{ secrets.MERCADO_LIVRE_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ./pipeline
          pip install -e ./backend

      - name: Add jitter delay
        run: |
          # Random sleep 0-120 seconds to prevent thundering herd
          echo "Adding jitter delay to prevent resource contention..."
          sleep $((RANDOM % 120))

      - name: Run crawlers with retry
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 30
          max_attempts: 3
          retry_on: error
          command: |
            echo "Running Brazil Store crawler (attempt $GITHUB_RUN_ATTEMPT)..."
            python -m pipeline.crawlers.brazil_store
            echo "Running Mercado Livre crawler (attempt $GITHUB_RUN_ATTEMPT)..."
            python -m pipeline.crawlers.mercado_livre
            echo "Running Dropshot Brasil crawler (attempt $GITHUB_RUN_ATTEMPT)..."
            python -m pipeline.crawlers.dropshot_brasil

      - name: Verify crawl results
        run: |
          python -c "
import asyncio
from pipeline.db.connection import get_pool

async def count_paddles():
    try:
        pool = await get_pool()
        async with pool.acquire() as conn:
            result = await conn.fetchval('SELECT COUNT(*) FROM paddles')
            print(f'Total paddles indexed: {result}')
            if result < 200:
                print(f'WARNING: Expected >= 200 paddles, got {result}')
    except Exception as e:
        print(f'Database check failed: {e}')

asyncio.run(count_paddles())
          "

      - name: Check data freshness
        if: always()
        run: |
          python -c "
import asyncio
import sys
from pipeline.alerts.freshness import check_data_freshness

async def main():
    results = await check_data_freshness()
    stale_sources = [s for s, fresh in results.items() if not fresh]
    if stale_sources:
        print(f'WARNING: Stale data detected for: {stale_sources}')
        sys.exit(0)  # Don't fail workflow, just alert
    else:
        print('All data sources are fresh')

asyncio.run(main())
          "
        continue-on-error: true

      - name: Notify on failure
        if: failure()
        run: |
          echo "Scraper workflow failed - check logs in Railway"
