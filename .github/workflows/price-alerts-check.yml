name: Price Alerts Check

on:
  schedule:
    - cron: '0 6 * * *'  # 6h UTC = 3h BRT
  workflow_dispatch:       # Allow manual runs for testing

jobs:
  check-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      FASTAPI_URL: ${{ secrets.FASTAPI_URL }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install "psycopg[binary,pool]" httpx python-telegram-bot

      - name: Run price alert worker
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 15
          max_attempts: 3
          retry_on: error
          command: python backend/workers/price_alert_check.py

      - name: Notify on failure
        if: failure()
        run: |
          python3 -c "
          import asyncio
          import os
          import sys
          sys.path.insert(0, '.')
          from pipeline.alerts.telegram import send_telegram_alert
          msg = '🚨 Price alerts check FAILED. Check: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}'
          asyncio.run(send_telegram_alert(msg))
          "
